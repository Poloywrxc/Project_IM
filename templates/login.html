{% extends 'base.html' %}

{% block content %}
    <div class="container my-5">
        <div class="row align-items-center min-vh-75">
            <div class="col-lg-6 pe-lg-5">
                <h1 class="display-5 fw-bold mb-4 text-compu-blue">Welcome to COMPUCART</h1>
                <p class="text-muted fs-5">Shop computer devices and accessories in one secure online platform.</p>
                <img src="{{ url_for('static', filename='hero-devices.png') }}" class="img-fluid mt-4 rounded-4 shadow" alt="COMPUCART Devices">
            </div>

            <div class="col-lg-5 offset-lg-1">
                <div class="card border-0 shadow p-4 p-md-5" style="border-radius: 30px;">
                    <h2 class="fw-bold mb-4 text-center text-compu-blue">Sign In</h2>
                    
                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <div>{{ error }}</div>
                    </div>
                    {% endif %}
                    
                    <form action="/" method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Email Address</label>
                            <input type="email" name="email" class="form-control py-2 rounded-form" placeholder="email@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Password</label>
                            <input type="password" name="password" class="form-control py-2 rounded-form" required>
                        </div>
                        <button type="submit" class="btn bg-compu-blue text-white w-100 py-2 fw-bold mb-3 rounded-pill">Sign In</button>
                    </form>

                    <div class="text-center small text-muted mt-3">
                        <p>Don't have an account? <a href="#" class="text-primary fw-bold text-decoration-none" data-bs-toggle="modal" data-bs-target="#registerModal">Create Account</a></p>
                        {# Guest link removed from here #}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3 rounded-4 border-0 shadow">
                <div class="modal-header border-0 pb-0 justify-content-center">
                    <h4 class="fw-bold">Create Account</h4>
                    <button type="button" class="btn-close position-absolute end-0 me-3" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form action="/register" method="POST">
                        <input type="text" name="fullname" class="form-control rounded-pill mb-3" placeholder="Full Name" required>
                        <input type="email" name="email" class="form-control rounded-pill mb-3" placeholder="Email" required>
                        <input type="password" name="password" class="form-control rounded-pill mb-3" placeholder="Password" required>
                        <input type="text" name="address" class="form-control rounded-pill mb-3" placeholder="Address" required>
                        <div class="mb-3 ms-2">
                            <label class="small text-muted">Birthdate</label>
                            <input type="date" name="birthdate" class="form-control rounded-pill" required>
                        </div>
                        <select name="role" class="form-select rounded-pill mb-3" required>
                            <option value="Customer">Customer</option>
                            <option value="Admin">Admin</option>
                        </select>
                        <div class="mb-3 ms-2">
                            <label class="small text-muted">Created At</label>
                            <input type="text" class="form-control rounded-pill bg-light" value="{{ today }}" readonly>
                        </div>
                        <button type="submit" class="btn bg-compu-blue text-white w-100 py-2 rounded-pill fw-bold">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}
