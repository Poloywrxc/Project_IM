<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPUCART {% if title %}- {{ title }}{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --compu-blue: #1a237e; } /* Matched to your design */
        .bg-compu-blue { background-color: var(--compu-blue); }
        
        /* Sticky Footer logic */
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; }
        .content-wrapper { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-light">

    {% include "navigation.html" %}

    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-compu-blue text-white py-5 mt-5">
        <div class="container">
            <div class="row gy-4">
                <div class="col-md-3">
                    <div class="d-flex align-items-center mb-2">
                        <i class="bi bi-cart4 fs-3 me-2"></i>
                        <h4 class="mb-0 fw-bold">COMPUCART</h4>
                    </div>
                    <p class="small opacity-75">Your Everyday Computer<br>Device Marketplace</p>
                </div>
                
                <div class="col-6 col-md-3">
                    <h6 class="fw-bold small mb-3">CUSTOMER SERVICE</h6>
                    <ul class="list-unstyled small opacity-75">
                        <li>FAQ</li>
                        <li>Shipping & Delivery</li>
                    </ul>
                </div>

                <div class="col-md-3 text-md-end ms-auto">
                    <h6 class="fw-bold small mb-3">FOLLOW US</h6>
                    <div class="d-flex gap-3 justify-content-md-end fs-4">
                        <i class="bi bi-facebook"></i>
                        <i class="bi bi-instagram"></i>
                        <i class="bi bi-twitter-x"></i>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
